# Parent → in_review on a linked PR opening (the "opening" board edge).
#
# The MERGE edge (→ shipped) is already zero-UI: GitHub's built-in "Item
# closed" automation fires on the PR's `Closes #N`. The OPENING edge is
# normally written by /workflows:work Phase 4 when the command opens the PR —
# this workflow covers the out-of-band case (a PR opened by a human, or by an
# agent outside the command). GitHub Projects has no enable-able built-in for
# "a linked PR opened," so we map the PR's closing issues to the one engine.
#
# Opt-in and self-skipping: a board Status write needs a Projects-write token
# (GITHUB_TOKEN cannot write Projects v2), reusing the same LIFECYCLE_BOARD_PAT
# secret as lifecycle-smoke. Without it the job SKIPS loudly, never reds-out a
# PR. Idempotent with the command's own --set-status write.
name: lifecycle-pr-in-review

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  in-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set linked issues to in_review
        env:
          LIFECYCLE_BOARD_PAT: ${{ secrets.LIFECYCLE_BOARD_PAT }}
        run: |
          if [ -z "$LIFECYCLE_BOARD_PAT" ]; then
            echo "::warning::LIFECYCLE_BOARD_PAT secret not configured — in_review write SKIPPED."
            echo "GITHUB_TOKEN cannot write Projects v2; add a machine-account PAT (project+repo)"
            echo "or an App installation token to enable the board write here."
            exit 0
          fi
          export GH_TOKEN="$LIFECYCLE_BOARD_PAT"
          gh pr view "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --json closingIssuesReferences \
            --jq '.closingIssuesReferences[].number' \
          | while read -r n; do
              [ -n "$n" ] || continue
              echo "Setting #$n → in_review"
              python3 plugins/agentic-engineering/scripts/lifecycle_board.py \
                --set-status "$n" in_review
            done
