name: Release PR

# Maintains one standing release PR per package (agentic-engineering,
# marketing) based on merged Conventional Commit titles. Merging a generated
# release PR is what cuts that package's tag + GitHub Release — see
# docs/solutions/plugin-versioning-requirements.md.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-pr:
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned per docs/solutions/security-issues/hardening-scaffolded-github-actions-workflows.md
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
