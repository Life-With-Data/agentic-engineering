name: Documentation health

# The skill dogfooded on its own marketplace. Two tiers:
#   scan  — deterministic gate; runs the in-repo scanner, fails on ERROR.
#   audit — agent-in-the-loop; runs the documentation-health skill via
#           claude-code-action, posts a review AS Claude (GitHub App), and
#           FAILS THE CHECK when its judgment finds a genuine must-fix — while
#           only proposing repairs, never pushing to a protected branch.
#
# Because we're testing the skill against its own repo, the scanner is used
# straight from the checkout (no pinned curl — that's for external consumers;
# see skills/documentation-health/assets/doc-health.yml for that template).

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read
  pull-requests: write

jobs:
  # ---------------------------------------------------------------- tier 1
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Deterministic scan (fail on ERROR)
        run: |
          python3 plugins/agentic-engineering/skills/documentation-health/scripts/doc_health_check.py \
            . --fail-on error
      - name: JSON report artifact
        if: always()
        run: |
          python3 plugins/agentic-engineering/skills/documentation-health/scripts/doc_health_check.py \
            . --json > doc-health.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: doc-health-report
          path: doc-health.json

  # ---------------------------------------------------------------- tier 2
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # The agent tier needs credentials — either a Claude Pro/Max subscription
      # token (CLAUDE_CODE_OAUTH_TOKEN, from `claude setup-token`) or a direct
      # ANTHROPIC_API_KEY. Without either (e.g. forks, or before the secret is
      # added) skip gracefully rather than fail — secrets can't be read in a
      # job/step `if:` directly, so map to env and branch on it.
      - name: Detect credentials
        id: key
        env:
          APIKEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Gate on the SAME credential the audit step passes (ANTHROPIC_API_KEY).
          # A long-lived API key never expires, so this check stops crying wolf
          # the way a lapsed `claude setup-token` OAuth token did (present but
          # invalid → SDK auth crash → hard-failed check on every PR). If the key
          # is absent (forks, or before it's set) the tier skips, never fails.
          if [ -n "$APIKEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No ANTHROPIC_API_KEY set — skipping the agent audit tier."
          fi

      - name: Documentation-health audit (propose only, fail on must-fix)
        id: audit
        if: steps.key.outputs.present == 'true'
        # Advisory tier: a startup/SDK crash of the agent (a bad floating
        # claude-code-action release, a settings incompatibility, a bad key)
        # must NOT fail this check — only a judgment-confirmed must_fix does,
        # and the "Enforce must-fix" step below owns that gate. Without this, an
        # agent that dies before producing structured output hard-fails the
        # check on unrelated PRs; the deterministic `scan` job still gates docs.
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          # Long-lived ANTHROPIC_API_KEY (no expiry) — chosen over a `claude
          # setup-token` OAuth token, which lapses and then hard-fails this check.
          # Pass exactly ONE credential: do NOT also pass claude_code_oauth_token,
          # because an unset secret resolves to an empty string and an empty auth
          # input breaks credential resolution (the SDK exits 1 before running).
          # For a Pro/Max subscription token instead, swap this line for:
          #   claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Load the skill from this very marketplace — dogfooding.
          plugin_marketplaces: https://github.com/Life-With-Data/agentic-engineering.git
          plugins: agentic-engineering@agentic-engineering
          # Grant the audit ONLY the tools it needs. Without an allowlist, CI's
          # non-interactive default denies every non-read-only tool — the Skill
          # tool and the python3 scanner were both denied, leaving the tier
          # structured-output-only (it could neither run the deterministic scan
          # nor post a review). This `settings` input is parsed as JSON (NO
          # shell-quote mangling, unlike claude_args), and the action writes it to
          # ~/.claude/settings.json — USER scope, exactly the scope that
          # `--setting-sources user` keeps, so these grants load while the repo's
          # project .claude/settings.json (fork-trap hooks) stays excluded. User
          # scope also needs no workspace-trust dialog, so the rules apply under
          # `-p` (project allow rules are ignored headless). The single-PR-review
          # tool is granted separately via --allowedTools below — see why there.
          settings: |
            {
              "permissions": {
                "allow": [
                  "Read",
                  "Glob",
                  "Grep",
                  "Skill",
                  "Bash(python3:*)",
                  "Bash(python:*)"
                ]
              }
            }
          # THE #128 FIX — the JSON-schema quotes are BACKSLASH-ESCAPED (\").
          # claude-code-action tokenizes claude_args with the `shell-quote` parser,
          # which strips bare double quotes: {"type":"object"} reached the CLI as
          # {type:object} — invalid JSON — so `claude` exited 1 at startup (~0.4s)
          # on every run the agent tier actually executed. This was NOT auth, the
          # CLI version, or settings (all ruled out by direct-invocation repro);
          # the argv the SDK spawned proved the quotes were gone. Escaping makes
          # shell-quote emit literal quotes, so the CLI parses valid JSON. Verified:
          # the audit then ran a full 53-turn pass and emitted structured output.
          #
          # --setting-sources user: hygiene — a read-only doc audit doesn't need
          # this repo's in-repo `.claude` config (fork-trap hooks, .mcp.json), which
          # the SDK would otherwise load via the default ["user","project","local"].
          # The documentation-health SKILL is unaffected: it comes from the installed
          # plugin (user scope), not from project settingSources.
          #
          # --allowedTools names the ONE GitHub MCP review tool. It does two jobs:
          # (1) it triggers the action to inject its full GitHub MCP server — the
          # server is only wired up when an mcp__github__* tool appears in
          # claude_args (the action's parseAllowedTools scans claude_args, NOT the
          # settings input) — and (2) it auto-approves that tool. --allowedTools is
          # ADDITIVE with the settings allowlist above (it grants without prompting;
          # it does NOT replace settings — verified against the permissions docs).
          # The tool name is all underscores/letters, so shell-quote passes it
          # through intact — unlike a Bash(...) pattern, whose parens/colon it would
          # mangle (the #128 class of bug), which is why the scanner/Skill grants
          # live in the JSON `settings` input, not here. create_and_submit_pull_
          # request_review posts ONE formal PR review as claude[bot] (the App
          # token), body-only (no line anchors) — so it works for whole-repo
          # findings that aren't on the PR's diff. The lighter servers can't: the
          # inline-comment server is diff-line-anchored, and the sticky-comment
          # server needs a tracking comment that agent mode never creates.
          claude_args: >-
            --setting-sources user
            --allowedTools mcp__github__create_and_submit_pull_request_review
            --json-schema
            {\"type\":\"object\",\"properties\":{\"must_fix\":{\"type\":\"boolean\"},\"summary\":{\"type\":\"string\"}},\"required\":[\"must_fix\",\"summary\"]}
          prompt: |
            Use the documentation-health skill to audit this repository in
            NON-INTERACTIVE CI mode, then judge the results.

            Repository: ${{ github.repository }}
            Pull request number: ${{ github.event.pull_request.number }}
            (The PR number is empty when this run is a schedule/dispatch rather
            than a pull request.)

            - Run the deterministic scanner, then do the judgment pass
              (duplication, Diátaxis mode-mixing, stale commands, README↔
              CLAUDE.md drift, cross-tool contradictions). Distinguish genuine
              problems from scanner false positives — do NOT treat a raw WARN as
              a must-fix if judgment shows it's noise.
            - PROPOSE ONLY. If this run is on a pull request (the PR number above
              is non-empty), post exactly ONE pull-request review by calling the
              `mcp__github__create_and_submit_pull_request_review` tool ONCE:
              owner and repo from the repository slug above, pullNumber the number
              above, event "COMMENT", and body = your findings grouped by layer/
              severity, each with file:line and the concrete fix. If there is no
              PR (schedule/dispatch), skip posting and rely on the structured
              output below. Do NOT edit files, do NOT commit, do NOT push.
            - Set structured output `must_fix` to true if and only if you found
              at least one genuinely broken/dangerous issue (an ERROR-class
              finding your judgment confirms — e.g. a real secret, a broken
              link/import, forked-and-unbridged agent-context files). Put a
              one-line rationale in `summary`.

      - name: Enforce must-fix (fail the check)
        if: steps.key.outputs.present == 'true'
        env:
          STRUCTURED: ${{ steps.audit.outputs.structured_output }}
        run: |
          MUST_FIX=$(printf '%s' "$STRUCTURED" | jq -r '.must_fix // false')
          SUMMARY=$(printf '%s' "$STRUCTURED" | jq -r '.summary // ""')
          if [ "$MUST_FIX" = "true" ]; then
            echo "::error::Documentation health found a must-fix issue: ${SUMMARY}"
            exit 1
          fi
          echo "No must-fix issues. ${SUMMARY}"
