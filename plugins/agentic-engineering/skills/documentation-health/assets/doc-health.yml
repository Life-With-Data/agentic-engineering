# Documentation-health CI — example workflow (copy into .github/workflows/).
#
# Two tiers, independent — keep one or both:
#
#   1. `scan`  — the DETERMINISTIC gate. Zero-dependency Python scanner; fast,
#                free, no secrets. Tune how strict it is with `--fail-on`.
#   2. `audit` — the AGENT-IN-THE-LOOP tier. Runs Claude Code with the
#                `documentation-health` skill to do the judgment pass the
#                scanner can't (duplication, Diátaxis mode-mixing, stale
#                commands, README↔CLAUDE.md drift) and to PROPOSE fixes as a
#                PR/review comment — never a push to a protected branch.
#
# The scanner is a single self-contained file. Rather than depend on the
# plugin being installed in CI, this template fetches it at a pinned ref. The
# marketplace auto-tags `v<version>` on release, so DOCS_HEALTH_REF defaults to
# a version tag (a commit SHA is equally valid and even stricter). Avoid a
# moving ref like `main` for a gate — it can change under you between runs.

name: documentation-health

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"   # weekly drift sweep (Mondays 09:00 UTC)

permissions:
  contents: read
  pull-requests: write     # `audit` posts a review/opens a PR

env:
  DOCS_HEALTH_REPO: Life-With-Data/agentic-engineering
  # Pin to an immutable ref. The marketplace auto-tags `v<version>` on release,
  # so a version tag is the recommended pin (a commit SHA is equally valid and
  # even stricter). Avoid `main` for a gate — a moving ref can change the gate
  # under you between runs.
  DOCS_HEALTH_REF: v3.21.1
  SCRIPT_PATH: plugins/agentic-engineering/skills/documentation-health/scripts/doc_health_check.py

jobs:
  # ---------------------------------------------------------------- tier 1
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch scanner (pinned)
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/${DOCS_HEALTH_REPO}/${DOCS_HEALTH_REF}/${SCRIPT_PATH}" \
            -o /tmp/doc_health_check.py

      # Optional deeper checks — the scanner uses them when present, skips them
      # gracefully when absent. Drop this step to keep the gate hermetic.
      - name: Install optional link/TOC/format tools
        run: |
          curl -fsSL https://raw.githubusercontent.com/lycheeverse/lychee/master/install.sh | bash || true
          npm install -g doctoc markdownlint-cli2 || true

      - name: Scan
        # --fail-on tunes the gate strictness:
        #   error  → fail only on ERROR (broken/dangerous). Good default for PRs.
        #   warn   → also fail on drift-prone WARNs. For teams that want it tight.
        #   info   → fail on any finding at all. Usually too strict for a gate.
        #   never  → never fail; report only (pair with the JSON artifact).
        run: python3 /tmp/doc_health_check.py . --fail-on error

      - name: Upload JSON report
        if: always()
        run: python3 /tmp/doc_health_check.py . --json > doc-health.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: doc-health-report
          path: doc-health.json

  # ---------------------------------------------------------------- tier 2
  # The judgment pass + proposed repairs. Needs credentials: a Claude Pro/Max
  # subscription token (CLAUDE_CODE_OAUTH_TOKEN, from `claude setup-token`) or a
  # direct ANTHROPIC_API_KEY. Posts AS Claude (via the official Claude GitHub App
  # identity), and FAILS the check when its judgment finds a genuine must-fix —
  # while only proposing repairs, never pushing. Remove this job for a
  # deterministic-only gate.
  audit:
    runs-on: ubuntu-latest
    # Don't burn agent minutes on every push; gate it behind a label or dispatch.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      contains(github.event.pull_request.labels.*.name, 'docs-health')
    steps:
      - uses: actions/checkout@v4

      - name: Documentation-health audit (propose only, fail on must-fix)
        id: audit
        uses: anthropics/claude-code-action@v1
        with:
          # Pass EXACTLY ONE credential — the one you use. Do NOT pass both:
          # an unset secret resolves to an empty string, and an empty auth input
          # breaks credential resolution (the SDK exits 1 before running).
          # Subscription (Pro/Max, bills against your plan):
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # API key instead? Delete the line above and use:
          #   anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Install this marketplace so the skill (and its scanner) are available.
          # `plugins` is plugin-name@marketplace-id; `plugin_marketplaces` is the
          # registry git URL.
          plugin_marketplaces: https://github.com/${{ env.DOCS_HEALTH_REPO }}.git
          plugins: agentic-engineering@agentic-engineering
          # Structured output is the machine-readable pass/fail signal.
          claude_args: >-
            --json-schema
            {"type":"object","properties":{"must_fix":{"type":"boolean"},"summary":{"type":"string"}},"required":["must_fix","summary"]}
          prompt: |
            Use the documentation-health skill to audit this repository in
            NON-INTERACTIVE CI mode, then judge the results.

            - Run the deterministic scanner, then do the judgment pass
              (duplication, Diátaxis mode-mixing, stale commands, README↔
              CLAUDE.md drift, cross-tool contradictions). Separate genuine
              problems from scanner false positives — a raw WARN that judgment
              shows is noise is NOT a must-fix.
            - PROPOSE ONLY. Post ONE pull-request review grouped by layer/
              severity with file:line and the concrete fix. Do NOT edit files,
              commit, or push to any branch.
            - Set structured output `must_fix` to true iff you confirmed at
              least one genuinely broken/dangerous issue (ERROR-class — a real
              secret, broken link/import, forked-and-unbridged agent context).
              One-line rationale in `summary`.

      # Turn the agent's verdict into a red/green check. With branch protection
      # marking this job Required, a must-fix blocks merge.
      - name: Enforce must-fix
        env:
          STRUCTURED: ${{ steps.audit.outputs.structured_output }}
        run: |
          MUST_FIX=$(printf '%s' "$STRUCTURED" | jq -r '.must_fix // false')
          SUMMARY=$(printf '%s' "$STRUCTURED" | jq -r '.summary // ""')
          if [ "$MUST_FIX" = "true" ]; then
            echo "::error::Documentation health found a must-fix issue: ${SUMMARY}"
            exit 1
          fi
          echo "No must-fix issues. ${SUMMARY}"
