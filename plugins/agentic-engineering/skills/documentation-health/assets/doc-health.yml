# Documentation-health CI — example workflow (copy into .github/workflows/).
#
# Two tiers, independent — keep one or both:
#
#   1. `scan`  — the DETERMINISTIC gate. Zero-dependency Python scanner; fast,
#                free, no secrets. Tune how strict it is with `--fail-on`.
#   2. `audit` — the AGENT-IN-THE-LOOP tier. Runs Claude Code with the
#                `documentation-health` skill to do the judgment pass the
#                scanner can't (duplication, Diátaxis mode-mixing, stale
#                commands, README↔CLAUDE.md drift) and to PROPOSE fixes as a
#                PR/review comment — never a push to a protected branch.
#
# The scanner is a single self-contained file. Rather than depend on the
# plugin being installed in CI, this template fetches it at a ref you choose.
# This marketplace ships as a ROLLING RELEASE off `main` (no version tags),
# so `main` is the default and always resolves. For a reproducible gate that
# can't change under you, pin DOCS_HEALTH_REF to a commit SHA instead.

name: documentation-health

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"   # weekly drift sweep (Mondays 09:00 UTC)

permissions:
  contents: read
  pull-requests: write     # `audit` posts a review/opens a PR

env:
  DOCS_HEALTH_REPO: Life-With-Data/agentic-engineering
  # `main` tracks latest (rolling release). Swap for a commit SHA to freeze the
  # gate — a moving ref means your gate can change under you between runs.
  DOCS_HEALTH_REF: main
  SCRIPT_PATH: plugins/agentic-engineering/skills/documentation-health/scripts/doc_health_check.py

jobs:
  # ---------------------------------------------------------------- tier 1
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch scanner (pinned)
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/${DOCS_HEALTH_REPO}/${DOCS_HEALTH_REF}/${SCRIPT_PATH}" \
            -o /tmp/doc_health_check.py

      # Optional deeper checks — the scanner uses them when present, skips them
      # gracefully when absent. Drop this step to keep the gate hermetic.
      - name: Install optional link/TOC/format tools
        run: |
          curl -fsSL https://raw.githubusercontent.com/lycheeverse/lychee/master/install.sh | bash || true
          npm install -g doctoc markdownlint-cli2 || true

      - name: Scan
        # --fail-on tunes the gate strictness:
        #   error  → fail only on ERROR (broken/dangerous). Good default for PRs.
        #   warn   → also fail on drift-prone WARNs. For teams that want it tight.
        #   info   → fail on any finding at all. Usually too strict for a gate.
        #   never  → never fail; report only (pair with the JSON artifact).
        run: python3 /tmp/doc_health_check.py . --fail-on error

      - name: Upload JSON report
        if: always()
        run: python3 /tmp/doc_health_check.py . --json > doc-health.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: doc-health-report
          path: doc-health.json

  # ---------------------------------------------------------------- tier 2
  # The judgment pass + proposed repairs. Requires an ANTHROPIC_API_KEY secret.
  # Remove this job if you only want the deterministic gate.
  audit:
    runs-on: ubuntu-latest
    # Don't burn agent minutes on every push; gate it behind a label or dispatch.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      contains(github.event.pull_request.labels.*.name, 'docs-health')
    steps:
      - uses: actions/checkout@v4

      - name: Documentation-health audit (propose only)
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Install this marketplace so the skill (and its scanner) are available.
          plugins: ${{ env.DOCS_HEALTH_REPO }}@${{ env.DOCS_HEALTH_REF }}
          prompt: |
            Use the documentation-health skill to audit this repository in
            NON-INTERACTIVE CI mode.

            1. Run the deterministic scanner, then do the judgment pass
               (duplication, Diátaxis mode-mixing, stale commands, README↔
               CLAUDE.md drift, cross-tool contradictions).
            2. Do NOT write to the working tree on a protected branch and do
               NOT push. Instead:
                 - On a pull_request run, post a single review summarizing
                   findings grouped by layer/severity, with file:line and the
                   concrete fix for each.
                 - On a scheduled/dispatch run, open a draft PR containing the
                   structural repairs (prefer pointing hardcoded facts at their
                   generator over just correcting the number).
            3. Lead with what is genuinely broken; separate must-fix from
               nice-to-have. Keep it terse.
